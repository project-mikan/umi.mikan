services:
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/dev/backend/Dockerfile
    volumes:
      - ./backend:/backend
      - ./proto:/proto # 内部で解決できるようにマウント
      - ./schema:/schema # pg-schema-diff用
    environment:
      TZ: Asia/Tokyo
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: dev-pass
      DB_NAME: umi_mikan
      JWT_SECRET: "hogehoge"
      TEST_DB_HOST: postgres_test
      TEST_DB_PORT: 5432
      TEST_DB_USER: postgres
      TEST_DB_PASSWORD: test-pass
      TEST_DB_NAME: umi_mikan_test
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REGISTER_KEY: "usuyuki" # 新規登録を制限する場合はコメントを外して設定
      TASK_TIMEOUT_SECONDS: 600 # タスクステータスの有効期限(秒)
    tty: true
    ports:
      - "2001:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/dev/frontend/Dockerfile
    tty: true
    stdin_open: true
    ports:
      - "2000:5173"
    user: "1000:1000"
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/frontend
      - ./proto:/proto # 内部で解決できるようにマウント

  postgres:
    image: pgvector/pgvector:0.7.4-pg17
    platform: linux/amd64
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "dev-pass"
      POSTGRES_DB: "umi_mikan"
    volumes:
      - postgres_volume:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d

  postgres_test:
    image: pgvector/pgvector:0.7.4-pg17
    platform: linux/amd64
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "test-pass"
      POSTGRES_DB: "umi_mikan_test"
    volumes:
      - postgres_test_volume:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_volume:/data

  subscriber:
    build:
      context: ./backend
      dockerfile: ../infra/dev/subscriber/Dockerfile
    volumes:
      - ./backend:/backend
    environment:
      TZ: Asia/Tokyo
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: dev-pass
      DB_NAME: umi_mikan
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUBSCRIBER_MAX_CONCURRENT_JOBS: 10
    tty: true
    depends_on:
      - postgres
      - redis

  scheduler:
    build:
      context: ./backend
      dockerfile: ../infra/dev/scheduler/Dockerfile
    volumes:
      - ./backend:/backend
    environment:
      TZ: Asia/Tokyo
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: dev-pass
      DB_NAME: umi_mikan
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SCHEDULER_DAILY_INTERVAL: 5m
      SCHEDULER_MONTHLY_INTERVAL: 5m
      SCHEDULER_LATEST_TREND_HOUR: 4
      SCHEDULER_LATEST_TREND_MINUTE: 0
    tty: true
    depends_on:
      - postgres
      - redis

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_volume:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    depends_on:
      - scheduler
      - subscriber

  grafana:
    image: grafana/grafana:latest
    ports:
      - "2008:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: "http://localhost:2008" # GrafanaのURL（アラートリンクに使用）
      DISCORD_WEBHOOK_URL: "http://localhost" # dev環境用ダミー値（アラート通知は飛ばない）
    volumes:
      - grafana_volume:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg

  loki:
    image: grafana/loki:latest
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_volume:/loki
    command: -config.file=/etc/loki/local-config.yaml
    user: "0"

  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./monitoring/alloy/alloy-config.alloy:/etc/alloy/config.alloy
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - loki

volumes:
  postgres_volume:
  postgres_test_volume:
  redis_volume:
  prometheus_volume:
  grafana_volume:
  loki_volume:
