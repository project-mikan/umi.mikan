apiVersion: 1

contactPoints:
  - orgId: 1
    name: Discord
    receivers:
      - uid: discord_receiver
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          message: |
            {{ range .Alerts }}
            **[{{ .Status | toUpper }}]** {{ .Labels.alertname }}
            サービス: {{ .Labels.service }}
            {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: false
