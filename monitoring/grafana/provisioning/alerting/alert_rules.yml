apiVersion: 1

groups:
  - orgId: 1
    name: umi-mikan-errors
    folder: umi-mikan
    interval: 1m
    rules:
      # backendサービスのエラーログ検知
      - uid: backend_error_logs
        title: Backend エラーログ検知
        condition: A
        data:
          - refId: A
            queryType: instant
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({service="backend"} |~ "(?i)(error|panic|fatal)" [5m])'
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: instant
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "Backendサービスでエラーが検出されました"
          description: "過去5分間にbackendサービスでエラーログが{{ $values.A }}件発生しています"
        labels:
          service: backend
          severity: error
        isPaused: false

