name: 【iOS】Unit Tests

on:
  pull_request:
    paths:
      - "ios/**"
      - "proto/**"
      - ".github/**"
  # main の DerivedData キャッシュは全 PR から参照できるため、push でキャッシュを温めておく
  push:
    branches:
      - main
    paths:
      - "ios/**"
      - "proto/**"
      - ".github/**"

env:
  CONNECT_SWIFT_VERSION: "1.2.3"

jobs:
  # Proto 生成物(ios/Sources/Proto/*)はコミット済みなので、テストジョブでは再生成しない。
  # これによりテストジョブから brew install / connect-swift DL / grpc-swift(合計3.5分超)を排除できる。
  # 代わりに proto/** を変更した時だけ生成物のコミット漏れ(diff が出ないか)を検証する。
  # まず安価な ubuntu で proto 変更の有無を判定し、変更時のみ高コストな macos で検証する。
  changes:
    runs-on: ubuntu-latest
    outputs:
      proto: ${{ steps.filter.outputs.proto }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect proto changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
          else
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base"
          fi
          if git diff --name-only "$base" HEAD | grep -qE '^proto/'; then
            echo "proto=true" >> "$GITHUB_OUTPUT"
          else
            echo "proto=false" >> "$GITHUB_OUTPUT"
          fi

  verify-proto:
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Cache Homebrew packages
        id: cache-brew
        uses: actions/cache@v6
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/swift-protobuf
            /opt/homebrew/Cellar/grpc-swift
          key: ${{ runner.os }}-brew-swift-protobuf-grpc-swift-v1

      - name: Install protoc plugins (swift-protobuf, grpc-swift)
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: brew install swift-protobuf grpc-swift

      - name: Relink protoc plugins after cache restore
        if: steps.cache-brew.outputs.cache-hit == 'true'
        run: brew link --overwrite swift-protobuf grpc-swift 2>/dev/null || brew install swift-protobuf grpc-swift

      - name: Cache protoc-gen-connect-swift
        id: cache-connect-swift
        uses: actions/cache@v6
        with:
          path: /opt/homebrew/bin/protoc-gen-connect-swift
          key: ${{ runner.os }}-protoc-gen-connect-swift-${{ env.CONNECT_SWIFT_VERSION }}

      - name: Install protoc-gen-connect-swift
        if: steps.cache-connect-swift.outputs.cache-hit != 'true'
        run: curl -sL https://github.com/connectrpc/connect-swift/releases/download/${{ env.CONNECT_SWIFT_VERSION }}/protoc-gen-connect-swift.tar.gz | tar -xz -C $(brew --prefix)/bin/

      - name: Regenerate Swift gRPC code
        run: make grpc-swift

      # コミット済みの生成物と再生成結果が一致しなければ、生成物のコミット漏れとして失敗させる
      - name: Verify generated code is committed
        run: |
          if ! git diff --quiet ios/Sources/Proto/; then
            echo "::error::ios/Sources/Proto/ の生成物が最新ではありません。'make grpc-swift' を実行してコミットしてください。"
            git diff --stat ios/Sources/Proto/
            exit 1
          fi

  test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      # boot は非同期に進むので、依存キャッシュ復元中にシミュレータ起動を済ませておく
      - name: Boot simulator
        run: xcrun simctl boot "iPhone 17" || true

      # SPM 依存(SwiftProtobuf/Connect 等)のソースとビルド中間成果物をキャッシュする。
      # ビルド時間の大半はこれら依存のコンパイルで、Package.resolved が同じなら不変。
      # -derivedDataPath で DerivedData の場所を固定し、キャッシュパスを安定させる。
      #   - SourcePackages           : 依存のチェックアウト(再取得を回避)
      #   - Build/Intermediates.noindex/SwiftExplicitPrecompiledModules : 依存のプリコンパイルモジュール
      #   - Build/Products           : ビルド済みプロダクト
      # アプリ本体(umi.mikan.build)や XCBuildData はソース変更で毎回変わり、
      # mtime リセットで増分判定が壊れるためキャッシュ対象から外す。
      - name: Cache SPM build products
        uses: actions/cache@v6
        with:
          path: |
            DerivedData/SourcePackages
            DerivedData/Build/Intermediates.noindex/SwiftProtobuf.build
            DerivedData/Build/Intermediates.noindex/Connect.build
            DerivedData/Build/Intermediates.noindex/SwiftExplicitPrecompiledModules
            DerivedData/Build/Intermediates.noindex/GeneratedModuleMaps-iphonesimulator
            DerivedData/Build/Products
          key: ${{ runner.os }}-spm-build-${{ hashFiles('ios/umi.mikan.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-build-

      # キャッシュ復元後、依存の中間成果物(復元物)をソースより新しい mtime に揃え、
      # Xcode が「依存は最新」と判定して再コンパイルをスキップするようにする。
      # ソースは checkout で「今」に設定されるため、依存成果物をそれより新しくする。
      - name: Touch cached build products
        run: |
          if [ -d DerivedData/Build ]; then
            find DerivedData -exec touch {} + 2>/dev/null || true
          fi

      # ビルドとテスト実行を分離する(ビルドエラーとテスト失敗を切り分けやすくする)。
      #   ONLY_ACTIVE_ARCH=YES  : シミュレータの arm64 のみビルド(不要アーキを削る)
      #   -jobs                 : 論理CPU数まで並列コンパイル
      #   COMPILER_INDEX_STORE_ENABLE=NO : インデックス生成を無効化
      #   CODE_SIGNING_ALLOWED=NO        : シミュレータ向けは署名不要
      # -derivedDataPath は依存ビルド成果物キャッシュの位置を固定するため明示する
      # 生成物(ios/Sources/Proto/*)はコミット済みなのでここでは再生成しない(verify-proto で検証)
      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project ios/umi.mikan.xcodeproj \
            -scheme "umi.mikan" \
            -destination "platform=iOS Simulator,name=iPhone 17,arch=arm64" \
            -derivedDataPath DerivedData \
            -jobs $(sysctl -n hw.ncpu) \
            -quiet \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      # テストは数秒で終わるため並列テスト(シミュレータのクローン作成)は無効化し、
      # 事前ブート済みのシミュレータをそのまま使う
      # ビルド成果物を使うため build-for-testing と同じ -derivedDataPath を指定する
      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -project ios/umi.mikan.xcodeproj \
            -scheme "umi.mikan" \
            -destination "platform=iOS Simulator,name=iPhone 17,arch=arm64" \
            -derivedDataPath DerivedData \
            -parallel-testing-enabled NO \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
