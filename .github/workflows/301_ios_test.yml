name: 【iOS】Unit Tests

# .github/** 全体を対象にすると無関係なワークフロー変更(フロントエンド系など)でも
# 高コストな macos ランナーが起動してしまうため、この workflow ファイル自身のみに絞る
on:
  pull_request:
    paths:
      - "ios/**"
      - "proto/**"
      - ".github/workflows/301_ios_test.yml"
  # main のキャッシュ(SPM 依存のクローン)は全 PR から参照できるため、push でキャッシュを温めておく
  push:
    branches:
      - main
    paths:
      - "ios/**"
      - "proto/**"
      - ".github/workflows/301_ios_test.yml"

env:
  CONNECT_SWIFT_VERSION: "1.2.3"

jobs:
  # Proto 生成物(ios/Sources/Proto/*)はコミット済みなので、テストジョブでは再生成しない。
  # これによりテストジョブから brew install / connect-swift DL / grpc-swift(合計3.5分超)を排除できる。
  # 代わりに proto/** を変更した時だけ生成物のコミット漏れ(diff が出ないか)を検証する。
  # まず安価な ubuntu で proto 変更の有無を判定し、変更時のみ高コストな macos で検証する。
  changes:
    runs-on: ubuntu-latest
    outputs:
      proto: ${{ steps.filter.outputs.proto }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Detect proto changes
        id: filter
        run: |
          # before が全ゼロ（新規ブランチの初回pushなど）や fetch-depth の範囲外で
          # 解決できない場合は diff を安全に取れないため、安全側 (proto=true) にフォールバックし
          # verify-proto を必ず実行させる（誤って false 判定してコミット漏れを見逃さないようにする）
          if [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
              || ! git cat-file -e "$base" 2>/dev/null; then
              echo "proto=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base"
          fi
          if git diff --name-only "$base" HEAD | grep -qE '^proto/'; then
            echo "proto=true" >> "$GITHUB_OUTPUT"
          else
            echo "proto=false" >> "$GITHUB_OUTPUT"
          fi

  verify-proto:
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Cache Homebrew packages
        id: cache-brew
        uses: actions/cache@v6
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/swift-protobuf
            /opt/homebrew/Cellar/grpc-swift
          key: ${{ runner.os }}-brew-swift-protobuf-grpc-swift-v1

      - name: Install protoc plugins (swift-protobuf, grpc-swift)
        if: steps.cache-brew.outputs.cache-hit != 'true'
        run: brew install swift-protobuf grpc-swift

      - name: Relink protoc plugins after cache restore
        if: steps.cache-brew.outputs.cache-hit == 'true'
        run: brew link --overwrite swift-protobuf grpc-swift 2>/dev/null || brew install swift-protobuf grpc-swift

      - name: Cache protoc-gen-connect-swift
        id: cache-connect-swift
        uses: actions/cache@v6
        with:
          path: /opt/homebrew/bin/protoc-gen-connect-swift
          key: ${{ runner.os }}-protoc-gen-connect-swift-${{ env.CONNECT_SWIFT_VERSION }}

      - name: Install protoc-gen-connect-swift
        if: steps.cache-connect-swift.outputs.cache-hit != 'true'
        run: curl -sL https://github.com/connectrpc/connect-swift/releases/download/${{ env.CONNECT_SWIFT_VERSION }}/protoc-gen-connect-swift.tar.gz | tar -xz -C $(brew --prefix)/bin/

      - name: Regenerate Swift gRPC code
        run: make grpc-swift

      # コミット済みの生成物と再生成結果が一致しなければ、生成物のコミット漏れとして失敗させる
      - name: Verify generated code is committed
        run: |
          if ! git diff --quiet ios/Sources/Proto/; then
            echo "::error::ios/Sources/Proto/ の生成物が最新ではありません。'make grpc-swift' を実行してコミットしてください。"
            git diff --stat ios/Sources/Proto/
            exit 1
          fi

  test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      # boot は同期で 20 秒前後かかるが、シミュレータが必要になるのはビルド完了後(数分先)
      # なので nohup + & で完全にバックグラウンド化してステップを即終了させる
      # (バックグラウンドでも boot はジョブ内で生き続け、xcodebuild 実行時には起動済みになる)
      - name: Boot simulator (background)
        run: nohup xcrun simctl boot "iPhone 17" >/dev/null 2>&1 &

      # SPM 依存のクローン(swift-nio-ssl は BoringSSL 同梱で特に重い)を毎回やり直さないよう
      # -clonedSourcePackagesDirPath を固定してキャッシュする。
      # 注意: DerivedData 全体 / 依存ビルド成果物のキャッシュは過去に検証したが効かなかった
      # (checkout の mtime リセットや絶対パスの相違で増分ビルドが再現できずフルビルドになる)。
      # 一方このキャッシュは「ソースのチェックアウト」だけなので mtime 問題の影響を受けず、
      # ネットワーク越しの git clone(1〜2分)を丸ごと省ける。
      - name: Cache SPM dependencies
        uses: actions/cache@v6
        with:
          path: ios/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/umi.mikan.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # CI が遅い根本は macos ランナーが非力(3コア)なことなので、ビルドフラグでビルド自体を軽くする:
      #   ONLY_ACTIVE_ARCH=YES  : シミュレータの arm64 のみビルド(不要アーキを削る)
      #   -jobs                 : 論理CPU数まで並列コンパイル
      #   COMPILER_INDEX_STORE_ENABLE=NO : インデックス生成を無効化
      #   CODE_SIGNING_ALLOWED=NO        : シミュレータ向けは署名不要
      #   SWIFT_COMPILATION_MODE=wholemodule : 毎回クリーンビルドの CI では増分ビルド用の
      #     ファイル単位コンパイルより、モジュール一括コンパイルの方が総仕事量が少なく速い
      #   -onlyUsePackageVersionsFromResolvedFile : Package.resolved のバージョンをそのまま使い、
      #     依存解決(バージョン再計算)を省く
      # 並列テスト(シミュレータのクローン作成)は無効化し、事前ブート済みのシミュレータを使う。
      # 生成物(ios/Sources/Proto/*)はコミット済みなのでここでは再生成しない(verify-proto で検証)
      - name: Run tests
        run: |
          xcodebuild test \
            -project ios/umi.mikan.xcodeproj \
            -scheme "umi.mikan" \
            -destination "platform=iOS Simulator,name=iPhone 17,arch=arm64" \
            -jobs $(sysctl -n hw.ncpu) \
            -parallel-testing-enabled NO \
            -clonedSourcePackagesDirPath ios/SourcePackages \
            -onlyUsePackageVersionsFromResolvedFile \
            -quiet \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_COMPILATION_MODE=wholemodule
