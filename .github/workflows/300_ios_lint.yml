name: 【iOS】SwiftLint & SwiftFormat

on:
  pull_request:
    paths:
      - "ios/**"
      - ".github/**"

jobs:
  lint:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: SwiftFormat check
        working-directory: ./ios
        run: |
          swiftformat --config .swiftformat Sources/ --dryrun 2>&1 | tee /tmp/swiftformat.log
          if grep -qE "^[1-9][0-9]*/[0-9]+ files would have been formatted" /tmp/swiftformat.log; then
            echo "SwiftFormat の差分があります。ローカルで 'make ios-format' を実行して修正してください:"
            cat /tmp/swiftformat.log
            exit 1
          fi

      - name: SwiftLint
        working-directory: ./ios
        run: swiftlint lint --config .swiftlint.yml --strict
